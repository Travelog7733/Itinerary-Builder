<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Travelog Itinerary</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --brand:#1D9E75;
  --brand-dark:#0F6E56;
  --blue:#0B3D91;
  --bg:#ffffff;
  --bg-soft:#F7FAF9;
  --line:#E4ECE9;
  --text:#1B1F1E;
  --muted:#6B7471;
  --shadow:0 8px 30px rgba(0,0,0,.04);
  --font:'Inter',sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--font);
  background:#F4F7F6;
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:1280px;
  margin:auto;
  padding:20px;
}

/* ---------- HEADER ---------- */

.top{
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
}

.top-grid{
  display:grid;
  grid-template-columns:1fr auto;
  gap:20px;
}

.brand{
  font-size:34px;
  font-weight:700;
}

.brand span{
  color:var(--brand);
}

.itin-row{
  margin-top:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.itin-label{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
}

.itin-badge{
  background:#E8F7F1;
  color:#085041;
  border:1px solid #BFE8D9;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

.page-title{
  margin-top:20px;
  font-size:24px;
  font-weight:600;
}

.meta-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(220px,1fr));
  gap:14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
}

.input,
textarea,
.date-input{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  font-size:14px;
  background:#fff;
  font-family:var(--font);
  color:#111;
}

.input:focus,
textarea:focus,
.date-input:focus{
  outline:none;
  border-color:var(--brand);
}

.strip{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.strip-card{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.strip-title{
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
}

/* ---------- CARD ---------- */

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
}

.section-head{
  margin-bottom:18px;
}

.section-title{
  font-size:20px;
  font-weight:600;
}

.section-sub{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

/* ---------- HOTEL / CRUISE ---------- */

.extra-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.hotel-block,
.cruise-block{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
}

.block-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:14px;
  color:var(--brand-dark);
  text-transform:uppercase;
}

.hotel-item,
.cruise-item{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:14px;
}

.add-mini-btn{
  border:none;
  background:var(--brand);
  color:#fff;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

/* ---------- PRICE ---------- */

.rates-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.mini-card{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
}

.mini-title{
  font-size:12px;
  color:var(--muted);
  margin-bottom:14px;
  text-transform:uppercase;
}

.rate-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}

.small-input{
  width:130px;
  text-align:right;
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
  font-size:15px;
  font-weight:700;
  color:var(--blue);
  font-family:var(--font);
}

.total{
  margin-top:20px;
  background:#F2FBF7;
  border:1px solid #CFECDD;
  border-radius:18px;
  padding:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total-label{
  font-size:13px;
  color:var(--muted);
}

.total-amt{
  font-size:42px;
  font-weight:700;
  color:var(--brand-dark);
}

/* ---------- TABLE ---------- */

.table-wrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

th{
  background:#F7FAF9;
  padding:14px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  text-align:left;
  border-bottom:1px solid var(--line);
}

td{
  padding:14px;
  border-bottom:1px solid var(--line);
  vertical-align:top;
}

.day-pill{
  background:#EAF8F2;
  color:#0B664F;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.cell-textarea{
  min-height:90px;
  resize:vertical;
}

/* ---------- OPTIONS ---------- */

.option-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.option-btn{
  border:1px solid #CFECDD;
  background:#fff;
  color:#0B664F;
  border-radius:10px;
  padding:7px 12px;
  font-size:12px;
  cursor:pointer;
  font-weight:600;
}

.option-btn.active{
  background:#1D9E75;
  color:#fff;
  border-color:#1D9E75;
}

/* ---------- BUTTONS ---------- */

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}

.btn{
  border:none;
  border-radius:14px;
  padding:12px 18px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  font-family:var(--font);
}

.btn-primary{
  background:var(--brand);
  color:#fff;
}

.btn-light{
  background:#fff;
  border:1px solid var(--line);
}

/* ---------- SAVED SECTION ---------- */

.saved-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  margin-top:20px;
}

.saved-item{
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.saved-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.saved-title{
  font-weight:700;
}

.saved-sub{
  font-size:12px;
  color:var(--muted);
}

.saved-actions{
  display:flex;
  gap:8px;
}

.small-btn{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.load-btn{
  background:#EAF8F2;
  color:#0B664F;
}

.delete-btn{
  background:#FFE9E9;
  color:#B42318;
}

/* ---------- MOBILE ---------- */

@media(max-width:960px){

  .top-grid,
  .extra-grid,
  .rates-grid,
  .strip,
  .hotel-item,
  .cruise-item{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="wrap" id="pdfContent">

<!-- HEADER -->

<div class="top">

<div class="top-grid">

<div>

<div class="brand">
travel<span>og</span>
</div>

<div class="itin-row">
<span class="itin-label">Itinerary No.</span>
<span class="itin-badge" id="itinNumber">TG-001</span>
</div>

<div class="page-title">
Travel Itinerary
</div>

</div>

<div class="meta-grid">

<div class="field">
<label class="label">Customer Name</label>
<input class="input save-field" id="customerName">
</div>

<div class="field">
<label class="label">Sales Person</label>
<input class="input save-field" id="salesPerson">
</div>

</div>

</div>

<div class="strip">

<div class="strip-card">
<div class="strip-title">Travel Date</div>
<input type="date" class="date-input save-field" id="travelDate">
</div>

<div class="strip-card">
<div class="strip-title">Quote Expiry</div>
<input type="date" class="date-input save-field" id="quoteExpiry">
</div>

</div>

</div>

<!-- HOTEL / CRUISE -->

<div class="card">

<div class="extra-grid">

<div class="hotel-block">

<div class="block-title">Hotel Details</div>

<div id="hotelContainer">

<div class="hotel-item">
<input class="input hotel-name" placeholder="Hotel Name">
<input class="input hotel-destination" placeholder="Destination">
</div>

</div>

<button class="add-mini-btn" onclick="addHotel()">
+ Add Hotel
</button>

</div>

<div class="cruise-block">

<div class="block-title">Cruise Details</div>

<div id="cruiseContainer">

<div class="cruise-item">
<input class="input cruise-name" placeholder="Cruise Name">
<input class="input cruise-destination" placeholder="Destination">
</div>

</div>

<button class="add-mini-btn" onclick="addCruise()">
+ Add Cruise
</button>

</div>

</div>

</div>

<!-- INCLUSIONS / EXCLUSIONS -->

<div class="card">

<div class="section-head">

<div class="section-title">
Inclusions & Exclusions
</div>

<div class="section-sub">
Package inclusions and exclusions
</div>

</div>

<div class="extra-grid">

<div class="hotel-block">

<div class="block-title">
Inclusions
</div>

<div id="inclusionContainer">

<div class="hotel-item">
<input class="input inclusion-input" placeholder="Enter inclusion">
</div>

</div>

<button class="add-mini-btn" onclick="addInclusion()">
+ Add Inclusion
</button>

</div>

<div class="cruise-block">

<div class="block-title">
Exclusions
</div>

<div id="exclusionContainer">

<div class="cruise-item">
<input class="input exclusion-input" placeholder="Enter exclusion">
</div>

</div>

<button class="add-mini-btn" onclick="addExclusion()">
+ Add Exclusion
</button>

</div>

</div>

</div>

<script>

/* ---------- ADD INCLUSION ---------- */

function addInclusion(){

  const html = `

  <div class="hotel-item">
    <input class="input inclusion-input" placeholder="Enter inclusion">
  </div>

  `;

  document
  .getElementById("inclusionContainer")
  .insertAdjacentHTML("beforeend", html);

}

/* ---------- ADD EXCLUSION ---------- */

function addExclusion(){

  const html = `

  <div class="cruise-item">
    <input class="input exclusion-input" placeholder="Enter exclusion">
  </div>

  `;

  document
  .getElementById("exclusionContainer")
  .insertAdjacentHTML("beforeend", html);

}

</script>

</body>
</html>
</body>
</html>
