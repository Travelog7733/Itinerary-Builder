<script>

let dayCount = 1;

/* ---------- ITIN NUMBER ---------- */

function getNextItineraryNumber(){

  let current =
    localStorage.getItem(
      "travelog_last_number"
    );

  current = current
    ? Number(current)
    : 1;

  const formatted =
    "TG-" +
    String(current).padStart(3,"0");

  document.getElementById(
    "itinNumber"
  ).innerText = formatted;

}

function increaseItineraryNumber(){

  let current =
    localStorage.getItem(
      "travelog_last_number"
    );

  current = current
    ? Number(current)
    : 1;

  current++;

  localStorage.setItem(
    "travelog_last_number",
    current
  );

}

/* ---------- TOGGLE ---------- */

function toggleBtn(btn){
  btn.classList.toggle("active");
}

/* ---------- ADD HOTEL ---------- */

function addHotel(){

  const html = `

  <div class="hotel-item">

    <input
      class="input hotel-name"
      placeholder="Hotel Name">

    <input
      class="input hotel-destination"
      placeholder="Destination">

  </div>

  `;

  document
  .getElementById("hotelContainer")
  .insertAdjacentHTML(
    "beforeend",
    html
  );

}

/* ---------- ADD CRUISE ---------- */

function addCruise(){

  const html = `

  <div class="cruise-item">

    <input
      class="input cruise-name"
      placeholder="Cruise Name">

    <input
      class="input cruise-destination"
      placeholder="Destination">

  </div>

  `;

  document
  .getElementById("cruiseContainer")
  .insertAdjacentHTML(
    "beforeend",
    html
  );

}

/* ---------- ADD DAY ---------- */

function addDay(){

  dayCount++;

  const row = `

  <tr>

    <td>
      <span class="day-pill">
        Day ${dayCount}
      </span>
    </td>

    <td>
      <textarea
        class="input cell-textarea activity">
      </textarea>
    </td>

    <td>

      <div class="option-group">

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          B
        </button>

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          L
        </button>

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          D
        </button>

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          BR
        </button>

      </div>

      <div class="option-group">

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          Shared
        </button>

        <button
          type="button"
          class="option-btn"
          onclick="toggleBtn(this)">
          Private
        </button>

      </div>

    </td>

    <td>

      <textarea
        class="input cell-textarea notes">
      </textarea>

    </td>

  </tr>

  `;

  document
  .getElementById("itineraryBody")
  .insertAdjacentHTML(
    "beforeend",
    row
  );

}

/* ---------- SAVE FIREBASE ---------- */

async function saveItinerary(){

  const itinerary = {

    number:
      document.getElementById(
        "itinNumber"
      ).innerText,

    customer:
      document.getElementById(
        "customerName"
      ).value,

    sales:
      document.getElementById(
        "salesPerson"
      ).value,

    travelDate:
      document.getElementById(
        "travelDate"
      ).value,

    created:
      new Date().toLocaleString()

  };

  try{

    await fb.addDoc(

      fb.collection(
        db,
        "itineraries"
      ),

      itinerary

    );

    alert(
      "Itinerary Saved!"
    );

    renderSaved();

    increaseItineraryNumber();

    getNextItineraryNumber();

  }

  catch(error){

    console.log(error);

    alert(
      "Firebase Save Error"
    );

  }

}

/* ---------- RENDER SAVED ---------- */

async function renderSaved(){

  const container =
    document.getElementById(
      "savedList"
    );

  container.innerHTML =
    "Loading...";

  try{

    const querySnapshot =
      await fb.getDocs(

        fb.collection(
          db,
          "itineraries"
        )

      );

    container.innerHTML = "";

    if(querySnapshot.empty){

      container.innerHTML =
        "<p>No saved itineraries yet.</p>";

      return;

    }

    querySnapshot.forEach(
      (docItem)=>{

      const item =
        docItem.data();

      container.innerHTML += `

      <div class="saved-item">

        <div class="saved-left">

          <div class="saved-title">
            ${item.number}
          </div>

          <div class="saved-sub">
            ${item.customer || "No Customer"}
          </div>

          <div class="saved-sub">
            ${item.travelDate || ""}
          </div>

        </div>

        <div class="saved-actions">

          <button
            class="small-btn delete-btn"
            onclick="deleteSaved('${docItem.id}')">

            Delete

          </button>

        </div>

      </div>

      `;

    });

  }

  catch(error){

    console.log(error);

    container.innerHTML =
      "Firebase connection error";

  }

}

/* ---------- DELETE ---------- */

async function deleteSaved(id){

  await fb.deleteDoc(
    fb.doc(
      db,
      "itineraries",
      id
    )
  );

  renderSaved();

}

/* ---------- CLEAR ---------- */

function clearAll(){

  if(confirm("Clear all data?")){

    document
    .querySelectorAll("input")
    .forEach(el=>{
      el.value="";
    });

    document
    .querySelectorAll("textarea")
    .forEach(el=>{
      el.value="";
    });

    document
    .querySelectorAll(".option-btn")
    .forEach(btn=>{
      btn.classList.remove(
        "active"
      );
    });

  }

}

/* ---------- TOTAL ---------- */

const fields = [

  "adultRate",
  "childRate",
  "infantRate",
  "adultPax",
  "childPax",
  "infantPax"

];

fields.forEach(id=>{

  document
  .getElementById(id)
  .addEventListener(
    "input",
    calculateTotals
  );

});

function cleanNumber(value){

  return Number(

    value.replace(
      /[^0-9]/g,
      ''
    )

  ) || 0;

}

function calculateTotals(){

  const adultRate =
    cleanNumber(
      document.getElementById(
        "adultRate"
      ).value
    );

  const childRate =
    cleanNumber(
      document.getElementById(
        "childRate"
      ).value
    );

  const infantRate =
    cleanNumber(
      document.getElementById(
        "infantRate"
      ).value
    );

  const adultPax =
    cleanNumber(
      document.getElementById(
        "adultPax"
      ).value
    );

  const childPax =
    cleanNumber(
      document.getElementById(
        "childPax"
      ).value
    );

  const infantPax =
    cleanNumber(
      document.getElementById(
        "infantPax"
      ).value
    );

  const adultTotal =
    adultRate * adultPax;

  const childTotal =
    childRate * childPax;

  const infantTotal =
    infantRate * infantPax;

  const grand =
    adultTotal +
    childTotal +
    infantTotal;

  document.getElementById(
    "adultTotal"
  ).innerText =
    "₹ " +
    adultTotal.toLocaleString(
      "en-IN"
    );

  document.getElementById(
    "childTotal"
  ).innerText =
    "₹ " +
    childTotal.toLocaleString(
      "en-IN"
    );

  document.getElementById(
    "infantTotal"
  ).innerText =
    "₹ " +
    infantTotal.toLocaleString(
      "en-IN"
    );

  document.getElementById(
    "grandTotal"
  ).innerText =
    "₹ " +
    grand.toLocaleString(
      "en-IN"
    );

}

/* ---------- PDF ---------- */

async function downloadPDF(){

  const { jsPDF } =
    window.jspdf;

  const element =
    document.getElementById(
      "pdfContent"
    );

  const canvas =
    await html2canvas(
      element,
      {
        scale:2,
        useCORS:true,
        backgroundColor:"#F4F7F6"
      }
    );

  const imgData =
    canvas.toDataURL(
      "image/png"
    );

  const pdf =
    new jsPDF(
      "p",
      "mm",
      "a4"
    );

  const pdfWidth =
    pdf.internal.pageSize.getWidth();

  const pdfHeight =
    pdf.internal.pageSize.getHeight();

  const imgWidth =
    pdfWidth;

  const imgHeight =
    (canvas.height * imgWidth)
    / canvas.width;

  let heightLeft =
    imgHeight;

  let position = 0;

  pdf.addImage(
    imgData,
    "PNG",
    0,
    position,
    imgWidth,
    imgHeight
  );

  heightLeft -= pdfHeight;

  while(heightLeft > 0){

    position =
      heightLeft - imgHeight;

    pdf.addPage();

    pdf.addImage(
      imgData,
      "PNG",
      0,
      position,
      imgWidth,
      imgHeight
    );

    heightLeft -= pdfHeight;

  }

  pdf.save(
    "travelog-itinerary.pdf"
  );

}

/* ---------- INIT ---------- */

getNextItineraryNumber();

setTimeout(()=>{

  renderSaved();

},1000);

</script>
